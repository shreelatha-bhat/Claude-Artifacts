name: Terragrunt

on:
  pull_request:
    branches: [main, master]
    paths:
      - '**.tf'
      - '**.hcl'
      - '**.tfvars'
  push:
    branches: [main, master]
    paths:
      - '**.tf'
      - '**.hcl'
      - '**.tfvars'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options: [plan, apply, destroy]

env:
  TF_VERSION: '1.5.0'
  TG_VERSION: '0.55.0'
  AWS_REGION: 'us-east-1'
  WORKING_DIR: 'environments'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      changed_dirs: ${{ steps.detect.outputs.changed_dirs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed Terragrunt modules
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '\.(tf|hcl|tfvars)$' \
            | xargs -I{} dirname {} \
            | sort -u \
            | jq -R . | jq -sc .)
          echo "changed_dirs=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Changed directories: ${CHANGED}"

  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: HCL Format Check
        run: terragrunt hclfmt --check --diff

      - name: Validate all modules
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt run-all validate --terragrunt-non-interactive

  plan:
    name: Plan (${{ matrix.dir }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.changed_dirs != '[]'
    strategy:
      matrix:
        dir: ${{ fromJson(needs.detect-changes.outputs.changed_dirs) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt Plan
        id: plan
        working-directory: ${{ matrix.dir }}
        run: terragrunt plan -no-color
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const planOutput = `${{ steps.plan.outputs.stdout }}`;
            const truncated = planOutput.length > 65000
              ? planOutput.substring(0, 65000) + '\n... (truncated)'
              : planOutput;
            const output = `#### Terragrunt Plan for \`${{ matrix.dir }}\` — \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ hashFiles(matrix.dir) }}
          path: ${{ matrix.dir }}/.terragrunt-cache
          retention-days: 5

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: ${{ github.event.inputs.environment || 'production' }}
    strategy:
      max-parallel: 1  # Sequential apply for safety
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt Apply
        working-directory: ${{ env.WORKING_DIR }}/${{ github.event.inputs.environment || 'prod' }}
        run: terragrunt run-all apply --terragrunt-non-interactive
